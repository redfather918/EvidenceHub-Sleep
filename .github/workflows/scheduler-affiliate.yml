# Job 6: Affiliate 更新 — 每周一 6:00 AM 北京时间 / UTC 周日 22:00
# 更新 Amazon 产品价格 + iHerb 库存（需 PA API / iHerb API 密钥激活）

name: "[Job 6] Affiliate Update"

on:
  schedule:
    - cron: "0 22 * * 0"
  workflow_dispatch:

env:
  BASE_URL: ${{ secrets.EVIDENCEHUB_BASE_URL || 'https://evidencehubsleep.com' }}

jobs:
  affiliate-update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call affiliate-update API
        run: |
          echo "→ [Job 6] Updating Amazon/iHerb prices and stock..."
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X GET "${BASE_URL}/api/cron/affiliate-update" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 300)
          echo "HTTP Status: ${HTTP_CODE}"
          cat /tmp/response.json
          if [ "${HTTP_CODE}" != "200" ]; then
            echo "::warning::Job 6 returned HTTP ${HTTP_CODE}"
            exit 1
          fi
